<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>서비스 만족도 설문조사</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">📋 설문조사</div>
  </nav>

  <main class="container">
    {% if not is_connected %}
    <div class="notice-card">
      ⚠️ 현재 설문이 준비 중입니다. 잠시 후 다시 시도해 주세요.
    </div>
    {% else %}
    <div class="form-wrapper">
      <div class="form-header">
        <h2>서비스 만족도 설문</h2>
        <p>소중한 의견을 남겨주세요 (약 1분 소요)</p>
      </div>

      <form id="surveyForm" class="survey-form" novalidate>

        <div class="form-group">
          <label class="form-label">이름 (또는 닉네임)</label>
          <input type="text" id="name" class="form-input" placeholder="홍길동" required/>
        </div>

        <div class="form-group">
          <label class="form-label">나이대</label>
          <div class="radio-group">
            {% for age in ["10대", "20대", "30대", "40대", "50대 이상"] %}
            <label class="radio-card">
              <input type="radio" name="age_group" value="{{ age }}"/>
              <span>{{ age }}</span>
            </label>
            {% endfor %}
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">전반적인 만족도</label>
          <div class="star-rating">
            {% for i in [5,4,3,2,1] %}
            <input type="radio" id="star{{ i }}" name="satisfaction" value="{{ i }}"/>
            <label for="star{{ i }}">★</label>
            {% endfor %}
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">주변에 추천하시겠습니까?</label>
          <div class="toggle-group">
            <label class="toggle-card">
              <input type="radio" name="recommend" value="예"/><span>👍 예</span>
            </label>
            <label class="toggle-card">
              <input type="radio" name="recommend" value="아니오"/><span>👎 아니오</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">자유 의견</label>
          <textarea id="opinion" class="form-textarea" rows="4"
            placeholder="개선사항이나 칭찬을 자유롭게 작성해 주세요." required></textarea>
        </div>

        <div id="errorMsg" class="error-banner" style="display:none"></div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          설문 제출하기
        </button>
      </form>

      <div id="successMsg" class="success-message" style="display:none">
        <div class="success-icon">🎉</div>
        <h3>감사합니다!</h3>
        <p>소중한 의견이 성공적으로 접수되었습니다.</p>
      </div>
    </div>
    {% endif %}
  </main>

  <script>
    document.getElementById("surveyForm")?.addEventListener("submit", async (e) => {
      e.preventDefault();

      const errorDiv = document.getElementById("errorMsg");
      errorDiv.style.display = "none";

      const name = document.getElementById("name").value.trim();
      const age_group = document.querySelector('[name="age_group"]:checked')?.value || "";
      const satisfaction = document.querySelector('[name="satisfaction"]:checked')?.value || "";
      const recommend = document.querySelector('[name="recommend"]:checked')?.value || "";
      const opinion = document.getElementById("opinion").value.trim();

      // 직접 유효성 검사
      if (!name) { showError("이름을 입력해주세요."); return; }
      if (!age_group) { showError("나이대를 선택해주세요."); return; }
      if (!satisfaction) { showError("만족도를 선택해주세요."); return; }
      if (!recommend) { showError("추천 여부를 선택해주세요."); return; }
      if (!opinion) { showError("자유 의견을 입력해주세요."); return; }

      const btn = document.getElementById("submitBtn");
      btn.textContent = "제출 중...";
      btn.disabled = true;

      try {
        const res = await fetch("/submit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, age_group, satisfaction, recommend, opinion }),
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById("surveyForm").style.display = "none";
          document.getElementById("successMsg").style.display = "block";
        } else {
          showError("오류: " + (data.error || "알 수 없는 오류"));
          btn.textContent = "설문 제출하기";
          btn.disabled = false;
        }
      } catch {
        showError("네트워크 오류가 발생했습니다.");
        btn.textContent = "설문 제출하기";
        btn.disabled = false;
      }

      function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = "block";
        errorDiv.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    });
  </script>
</body>
</html>
