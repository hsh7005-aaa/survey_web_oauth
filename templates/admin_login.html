<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 로그인</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <main class="container" style="max-width:420px;margin-top:8rem;">
    <div class="form-wrapper">
      <div class="form-header">
        <h2>🔐 관리자 로그인</h2>
        <p>관리자 비밀번호를 입력하세요</p>
      </div>

      {% if error %}
      <div class="error-banner">{{ error }}</div>
      {% endif %}

      <form method="POST" class="survey-form">
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" name="password" class="form-input"
            placeholder="관리자 비밀번호" autofocus required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full">로그인</button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;">
        <a href="/" class="btn btn-ghost btn-sm">← 설문 페이지로</a>
      </p>
    </div>
  </main>
</body>
</html>
